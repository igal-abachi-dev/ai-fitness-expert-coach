# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo in the Render dashboard; secrets marked sync: false are set there.
services:
  - type: web
    name: ai-fitness-expert-coach
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: info
      # Model roles ("<provider>/<modelId>"); free-tier default stack.
      - key: QUALITY_MODEL
        value: google/gemini-3-flash-preview
      - key: CHEAP_MODEL
        value: google/gemini-3.1-flash-lite
      - key: FAST_MODEL
        value: cerebras/gpt-oss-120b
      - key: AGENT_MODEL
        value: google/gemini-3-flash-preview
      - key: RATE_LIMIT_MAX
        value: "30"
      # Set in the Render dashboard (Environment → Add Secret). Only the keys
      # for providers referenced by the model roles above are required.
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      # Neon Postgres (pooled runtime URL + direct URL for CI migrations).
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_UNPOOLED
        sync: false
